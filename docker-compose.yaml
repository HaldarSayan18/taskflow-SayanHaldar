  services:
    frontend:
      build: ./frontend
      ports:
        - "4000:4000"
      volumes:
        - ./frontend:/app
        - /app/node_modules

    backend:
      build: ./backend
      ports:
        - "8080:8080"
      volumes:
        - ./backend:/app
        - /app/node_modules
      environment:
        - PORT=5000 # Tells your Node app to use port 4000
